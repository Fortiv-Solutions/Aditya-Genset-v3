<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auth Debug - Aditya Genset</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            max-width: 800px;
            margin: 40px auto;
            padding: 20px;
            background: #0f172a;
            color: #e2e8f0;
        }
        h1 { color: #fbbf24; }
        .section {
            background: #1e293b;
            padding: 20px;
            margin: 20px 0;
            border-radius: 8px;
            border: 1px solid #334155;
        }
        .status { padding: 10px; margin: 10px 0; border-radius: 4px; }
        .success { background: #065f46; border: 1px solid #10b981; }
        .error { background: #7f1d1d; border: 1px solid #ef4444; }
        .warning { background: #78350f; border: 1px solid #f59e0b; }
        button {
            background: #fbbf24;
            color: #0f172a;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            margin: 5px;
        }
        button:hover { background: #f59e0b; }
        pre {
            background: #0f172a;
            padding: 15px;
            border-radius: 4px;
            overflow-x: auto;
            border: 1px solid #334155;
        }
        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 4px;
            color: #e2e8f0;
        }
    </style>
</head>
<body>
    <h1>🔍 Authentication Debugger</h1>
    
    <div class="section">
        <h2>Environment Check</h2>
        <div id="env-check">Checking...</div>
    </div>

    <div class="section">
        <h2>Current Session</h2>
        <div id="session-check">Checking...</div>
        <button onclick="checkSession()">Refresh Session</button>
        <button onclick="clearSession()">Clear Session</button>
    </div>

    <div class="section">
        <h2>Test Login</h2>
        <input type="email" id="test-email" placeholder="Email" value="admin@adityagenset.com">
        <input type="password" id="test-password" placeholder="Password" value="admin123">
        <button onclick="testLogin()">Test Login</button>
        <div id="login-result"></div>
    </div>

    <div class="section">
        <h2>Profile Check</h2>
        <div id="profile-check">Not checked yet</div>
        <button onclick="checkProfile()">Check Profile</button>
    </div>

    <div class="section">
        <h2>Navigation Test</h2>
        <button onclick="window.location.href='/admin'">Go to /admin</button>
        <button onclick="window.location.href='/home'">Go to /home</button>
        <button onclick="window.location.href='/'">Go to /</button>
    </div>

    <script type="module">
        // Import Supabase client
        const SUPABASE_URL = import.meta.env?.VITE_SUPABASE_URL || localStorage.getItem('SUPABASE_URL') || prompt('Enter Supabase URL:');
        const SUPABASE_KEY = import.meta.env?.VITE_SUPABASE_ANON_KEY || localStorage.getItem('SUPABASE_KEY') || prompt('Enter Supabase Anon Key:');
        
        if (SUPABASE_URL && SUPABASE_KEY) {
            localStorage.setItem('SUPABASE_URL', SUPABASE_URL);
            localStorage.setItem('SUPABASE_KEY', SUPABASE_KEY);
        }

        // Check environment
        const envCheck = document.getElementById('env-check');
        if (SUPABASE_URL && SUPABASE_KEY) {
            envCheck.innerHTML = `
                <div class="status success">
                    ✅ Supabase URL: ${SUPABASE_URL.substring(0, 30)}...<br>
                    ✅ Supabase Key: ${SUPABASE_KEY.substring(0, 20)}...
                </div>
            `;
        } else {
            envCheck.innerHTML = `
                <div class="status error">
                    ❌ Missing Supabase credentials<br>
                    Please check your .env file
                </div>
            `;
        }

        // Make functions global
        window.checkSession = async function() {
            const sessionCheck = document.getElementById('session-check');
            sessionCheck.innerHTML = 'Checking session...';
            
            try {
                const response = await fetch(`${SUPABASE_URL}/auth/v1/user`, {
                    headers: {
                        'apikey': SUPABASE_KEY,
                        'Authorization': `Bearer ${localStorage.getItem('supabase.auth.token')}`
                    }
                });
                
                if (response.ok) {
                    const data = await response.json();
                    sessionCheck.innerHTML = `
                        <div class="status success">
                            ✅ Session Active<br>
                            User: ${data.email}<br>
                            ID: ${data.id}
                        </div>
                        <pre>${JSON.stringify(data, null, 2)}</pre>
                    `;
                } else {
                    sessionCheck.innerHTML = `
                        <div class="status warning">
                            ⚠️ No active session
                        </div>
                    `;
                }
            } catch (error) {
                sessionCheck.innerHTML = `
                    <div class="status error">
                        ❌ Error: ${error.message}
                    </div>
                `;
            }
        };

        window.clearSession = function() {
            localStorage.clear();
            sessionStorage.clear();
            document.getElementById('session-check').innerHTML = `
                <div class="status success">
                    ✅ Session cleared. Refresh page.
                </div>
            `;
        };

        window.testLogin = async function() {
            const email = document.getElementById('test-email').value;
            const password = document.getElementById('test-password').value;
            const result = document.getElementById('login-result');
            
            result.innerHTML = 'Logging in...';
            
            try {
                const response = await fetch(`${SUPABASE_URL}/auth/v1/token?grant_type=password`, {
                    method: 'POST',
                    headers: {
                        'apikey': SUPABASE_KEY,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ email, password })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    result.innerHTML = `
                        <div class="status success">
                            ✅ Login successful!<br>
                            User: ${data.user.email}<br>
                            Token: ${data.access_token.substring(0, 20)}...
                        </div>
                        <pre>${JSON.stringify(data, null, 2)}</pre>
                    `;
                    
                    // Store token
                    localStorage.setItem('supabase.auth.token', data.access_token);
                } else {
                    result.innerHTML = `
                        <div class="status error">
                            ❌ Login failed: ${data.error_description || data.message}
                        </div>
                        <pre>${JSON.stringify(data, null, 2)}</pre>
                    `;
                }
            } catch (error) {
                result.innerHTML = `
                    <div class="status error">
                        ❌ Error: ${error.message}
                    </div>
                `;
            }
        };

        window.checkProfile = async function() {
            const profileCheck = document.getElementById('profile-check');
            profileCheck.innerHTML = 'Checking profile...';
            
            try {
                // First get session
                const sessionResponse = await fetch(`${SUPABASE_URL}/auth/v1/user`, {
                    headers: {
                        'apikey': SUPABASE_KEY,
                        'Authorization': `Bearer ${localStorage.getItem('supabase.auth.token')}`
                    }
                });
                
                if (!sessionResponse.ok) {
                    profileCheck.innerHTML = `
                        <div class="status error">
                            ❌ No active session. Please login first.
                        </div>
                    `;
                    return;
                }
                
                const session = await sessionResponse.json();
                
                // Then get profile
                const profileResponse = await fetch(
                    `${SUPABASE_URL}/rest/v1/profiles?user_id=eq.${session.id}&select=*`,
                    {
                        headers: {
                            'apikey': SUPABASE_KEY,
                            'Authorization': `Bearer ${localStorage.getItem('supabase.auth.token')}`
                        }
                    }
                );
                
                const profiles = await profileResponse.json();
                
                if (profiles && profiles.length > 0) {
                    const profile = profiles[0];
                    profileCheck.innerHTML = `
                        <div class="status success">
                            ✅ Profile found<br>
                            Role: ${profile.role}<br>
                            Name: ${profile.full_name || 'Not set'}
                        </div>
                        <pre>${JSON.stringify(profile, null, 2)}</pre>
                    `;
                } else {
                    profileCheck.innerHTML = `
                        <div class="status error">
                            ❌ No profile found for user ${session.email}<br>
                            User ID: ${session.id}<br>
                            <strong>This is the problem!</strong> Create a profile in Supabase.
                        </div>
                    `;
                }
            } catch (error) {
                profileCheck.innerHTML = `
                    <div class="status error">
                        ❌ Error: ${error.message}
                    </div>
                `;
            }
        };

        // Auto-check on load
        window.checkSession();
    </script>
</body>
</html>
