<!DOCTYPE html>
<html>
<head>
    <title>Diagnostic - Aditya Genset</title>
    <style>
        body {
            font-family: 'Courier New', monospace;
            padding: 20px;
            background: #1e1e1e;
            color: #00ff00;
        }
        .section {
            margin: 20px 0;
            padding: 15px;
            background: #2d2d2d;
            border-left: 4px solid #00ff00;
        }
        h1 { color: #00ff00; }
        h2 { color: #ffff00; }
        .status { color: #00ff00; }
        .error { color: #ff0000; }
        button {
            background: #00ff00;
            color: #000;
            border: none;
            padding: 10px 20px;
            margin: 5px;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover { background: #00cc00; }
        pre {
            background: #000;
            padding: 10px;
            overflow-x: auto;
        }
    </style>
</head>
<body>
    <h1>🔍 Aditya Genset - Diagnostic Tool</h1>
    
    <div class="section">
        <h2>📊 Current Status</h2>
        <div id="status"></div>
    </div>

    <div class="section">
        <h2>🔐 Authentication</h2>
        <div id="auth"></div>
        <button onclick="setLogin()">Set Login</button>
        <button onclick="clearLogin()">Clear Login</button>
    </div>

    <div class="section">
        <h2>🗄️ LocalStorage</h2>
        <div id="storage"></div>
    </div>

    <div class="section">
        <h2>🌐 Environment</h2>
        <div id="env"></div>
    </div>

    <div class="section">
        <h2>🚀 Actions</h2>
        <button onclick="window.location.href='http://localhost:8080'">Open App</button>
        <button onclick="window.location.href='http://localhost:8080/login'">Open Login</button>
        <button onclick="testSupabase()">Test Supabase</button>
        <button onclick="location.reload()">Refresh</button>
    </div>

    <div class="section">
        <h2>📝 Console Output</h2>
        <pre id="console"></pre>
    </div>

    <script>
        let consoleOutput = [];
        
        // Override console.log
        const originalLog = console.log;
        console.log = function(...args) {
            originalLog.apply(console, args);
            consoleOutput.push(args.join(' '));
            updateConsole();
        };

        function updateConsole() {
            document.getElementById('console').textContent = consoleOutput.join('\n');
        }

        function checkStatus() {
            const status = document.getElementById('status');
            status.innerHTML = `
                <p class="status">✅ Diagnostic page loaded</p>
                <p class="status">✅ JavaScript working</p>
                <p class="status">✅ LocalStorage accessible</p>
                <p>Current URL: ${window.location.href}</p>
                <p>User Agent: ${navigator.userAgent}</p>
            `;
        }

        function checkAuth() {
            const auth = document.getElementById('auth');
            const isLoggedIn = localStorage.getItem('isLoggedIn');
            const userEmail = localStorage.getItem('userEmail');
            
            auth.innerHTML = `
                <p>Login Status: <span class="${isLoggedIn === 'true' ? 'status' : 'error'}">${isLoggedIn === 'true' ? '✅ Logged In' : '❌ Not Logged In'}</span></p>
                <p>User Email: ${userEmail || 'Not set'}</p>
            `;
        }

        function checkStorage() {
            const storage = document.getElementById('storage');
            const items = [];
            
            for (let i = 0; i < localStorage.length; i++) {
                const key = localStorage.key(i);
                const value = localStorage.getItem(key);
                items.push(`<p><strong>${key}:</strong> ${value}</p>`);
            }
            
            storage.innerHTML = items.length > 0 ? items.join('') : '<p class="error">No items in localStorage</p>';
        }

        function checkEnv() {
            const env = document.getElementById('env');
            env.innerHTML = `
                <p>Protocol: ${window.location.protocol}</p>
                <p>Host: ${window.location.host}</p>
                <p>Port: ${window.location.port}</p>
                <p>Online: ${navigator.onLine ? '✅ Yes' : '❌ No'}</p>
            `;
        }

        function setLogin() {
            localStorage.setItem('isLoggedIn', 'true');
            localStorage.setItem('userEmail', 'demo@test.com');
            console.log('✅ Login set');
            checkAuth();
            checkStorage();
            alert('✅ Login set! You can now open the app.');
        }

        function clearLogin() {
            localStorage.removeItem('isLoggedIn');
            localStorage.removeItem('userEmail');
            console.log('🗑️ Login cleared');
            checkAuth();
            checkStorage();
            alert('🗑️ Login cleared!');
        }

        async function testSupabase() {
            console.log('🔍 Testing Supabase connection...');
            try {
                const response = await fetch('https://vbbeibweeavuksmvkbnb.supabase.co/rest/v1/products?select=count&limit=1', {
                    headers: {
                        'apikey': 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZiYmVpYndlZWF2dWtzbXZrYm5iIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgwMTI2NDksImV4cCI6MjA5MzU4ODY0OX0.bkP7oDsg2jHMwNJAJG8KUzE4e725-6_uZnpd3OYiHtM',
                        'Authorization': 'Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZiYmVpYndlZWF2dWtzbXZrYm5iIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgwMTI2NDksImV4cCI6MjA5MzU4ODY0OX0.bkP7oDsg2jHMwNJAJG8KUzE4e725-6_uZnpd3OYiHtM'
                    }
                });
                
                if (response.ok) {
                    console.log('✅ Supabase connection successful!');
                    const data = await response.json();
                    console.log('Data:', data);
                } else {
                    console.log('❌ Supabase connection failed:', response.status);
                }
            } catch (error) {
                console.log('❌ Error:', error.message);
            }
        }

        // Run checks on load
        window.onload = function() {
            checkStatus();
            checkAuth();
            checkStorage();
            checkEnv();
            console.log('✅ Diagnostic page ready');
        };
    </script>
</body>
</html>
