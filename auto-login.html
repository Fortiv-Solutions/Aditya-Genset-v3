<!DOCTYPE html>
<html>
<head>
    <title>Auto Login - Aditya Genset</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .container {
            text-align: center;
            background: rgba(255,255,255,0.1);
            padding: 40px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
        }
        button {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            border-radius: 8px;
            cursor: pointer;
            margin: 10px;
        }
        button:hover {
            background: #45a049;
        }
        .info {
            margin: 20px 0;
            font-size: 14px;
            opacity: 0.9;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 Quick Login</h1>
        <p class="info">Click below to automatically log in and access the app</p>
        
        <button onclick="autoLogin()">
            🔓 Auto Login & Open App
        </button>
        
        <p class="info" style="margin-top: 30px; font-size: 12px;">
            This sets a demo login in localStorage<br>
            Your app will open at http://localhost:8080
        </p>
    </div>

    <script>
        function autoLogin() {
            // Set login state
            localStorage.setItem('isLoggedIn', 'true');
            localStorage.setItem('userEmail', 'demo@test.com');
            
            // Show success message
            alert('✅ Logged in successfully!\n\nRedirecting to app...');
            
            // Redirect to app
            window.location.href = 'http://localhost:8080';
        }
        
        // Auto-run on page load
        window.onload = function() {
            console.log('Auto-login page loaded');
            console.log('Click the button to log in');
        }
    </script>
</body>
</html>
